name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  contract-tests:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run template contract tests
        shell: pwsh
        run: |
          pwsh -NoProfile -File scripts/test-template-contract.ps1

  package-and-release:
    runs-on: ubuntu-latest
    needs: contract-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release archive + checksum
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="template_lab-${TAG}.zip"
          git archive --format=zip --output "$ARCHIVE" "$TAG"
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            template_lab-${{ github.ref_name }}.zip
            template_lab-${{ github.ref_name }}.zip.sha256
